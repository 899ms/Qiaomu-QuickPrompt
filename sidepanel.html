<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乔木快捷提示词</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="panel-body">
  <main class="panel-shell">
    <section class="main-view" id="mainView">
      <header class="panel-header">
        <div class="panel-tools">
          <label class="search-box panel-search compact-search">
            <span class="sr-only">搜索</span>
            <input id="searchInput" type="search" placeholder="搜索标题、内容、标签、简写">
          </label>
          <button class="primary-button" id="newItemButton">新增</button>
          <button class="icon-button settings-button" id="openSettingsButton" type="button" title="设置" aria-label="设置">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 8.97 3.6 1.7 1.7 0 0 0 10 2.04V2a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 8c.22.62.8 1 1.46 1H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <nav class="category-tabs" id="categoryTabs" aria-label="分类"></nav>

      <section class="panel-layout" id="panelLayout">
        <div class="prompt-list" id="promptList"></div>
      </section>
    </section>

    <section class="settings-page" id="settingsPage" hidden>
      <header class="settings-header">
        <button class="icon-button" id="backToMainButton" type="button" title="返回" aria-label="返回">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </button>
        <h1>设置</h1>
      </header>

      <div class="settings-stack">
        <section class="settings-card">
          <div class="settings-card-heading">
            <h2>简写替换</h2>
            <button class="switch-button" id="shortcutToggle" type="button" role="switch" aria-checked="true">
              <span class="switch-label">启用</span>
              <span class="switch-track" aria-hidden="true"><span></span></span>
            </button>
          </div>

          <div class="setting-row">
            <span>触发符</span>
            <div class="trigger-options" id="triggerOptions" aria-label="触发符">
              <button type="button" data-trigger="@">@</button>
              <button type="button" data-trigger="/">/</button>
              <button type="button" data-trigger=";">;</button>
              <button type="button" data-trigger="#">#</button>
            </div>
          </div>
        </section>

        <section class="settings-card">
          <h2>JSON 配置</h2>
          <div class="settings-actions">
            <button class="secondary-button" id="exportButton" type="button">导出 JSON</button>
            <label class="secondary-button file-button">
              导入 JSON
              <input type="file" id="importInput" accept="application/json,.json">
            </label>
          </div>
        </section>

        <section class="settings-card">
          <h2>内置提示词</h2>
          <button class="secondary-button danger-button" id="resetSeedsButton" type="button">重置内置提示词</button>
        </section>
      </div>
    </section>

    <dialog class="editor-dialog" id="editorDialog">
      <form class="editor-panel" id="editorForm">
        <input type="hidden" id="itemId">
        <div class="editor-heading">
          <h2 id="editorTitle">新增内容</h2>
          <div class="editor-icon-actions" aria-label="内容操作">
            <button type="button" class="editor-icon-button favorite-toggle" id="favoriteToggle" aria-pressed="false" aria-label="收藏">
              <svg class="editor-action-icon favorite-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"></path>
              </svg>
            </button>
            <button type="button" class="editor-icon-button danger" id="deleteButton" aria-label="删除">
              <svg class="editor-action-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
                <path d="M10 11v5"></path>
                <path d="M14 11v5"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="editor-topbar">
          <fieldset class="type-field">
            <legend>类型</legend>
            <div class="type-segment">
              <label>
                <input type="radio" name="promptType" value="text" id="typeTextInput">
                <span>文本</span>
              </label>
              <label>
                <input type="radio" name="promptType" value="image" id="typeImageInput">
                <span>生图</span>
              </label>
              <label>
                <input type="radio" name="promptType" value="video" id="typeVideoInput">
                <span>生视频</span>
              </label>
            </div>
          </fieldset>

        </div>

        <div class="editor-grid">
          <label class="field field-title">
            <span>标题</span>
            <input id="titleInput" type="text" required placeholder="例如：文章总结 Prompt">
          </label>

          <div class="meta-fields-row">
            <div class="field field-category">
              <span>分类</span>
              <div class="category-combobox">
                <input id="categoryInput" type="hidden" value="AI工作">
                <button type="button" class="category-select-button" id="categoryMenuButton" aria-haspopup="listbox" aria-expanded="false" aria-controls="categoryMenu">
                  <span class="category-selected-value" id="categorySelectedLabel">AI工作</span>
                  <svg class="chevron-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m6 9 6 6 6-6"></path>
                  </svg>
                </button>
                <div class="category-menu" id="categoryMenu" role="listbox" hidden></div>
              </div>
            </div>

            <label class="field field-shortcut">
              <span>简写（@）</span>
              <input id="shortcutInput" type="text" placeholder="sum">
            </label>
          </div>

          <label class="field field-tags">
            <span>标签（可选）</span>
            <input id="tagsInput" type="text" placeholder="写作, 总结, 回复">
          </label>

          <label class="field field-thumbnail" id="thumbnailUrlField" hidden>
            <span>缩略图 URL</span>
            <input id="thumbnailUrlInput" type="url" placeholder="https://example.com/image.jpg">
          </label>

          <label class="field field-content">
            <span>内容</span>
            <textarea id="contentInput" required placeholder="输入 Prompt 或常用语"></textarea>
          </label>
        </div>

        <div class="editor-actions">
          <button type="button" class="secondary-button" id="cancelButton">取消</button>
          <button type="button" class="secondary-button" id="copyButton">复制</button>
          <button type="submit" class="primary-button">保存</button>
        </div>

        <p class="status-line" id="statusLine" role="status"></p>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="image-preview-overlay" id="imagePreviewOverlay" hidden>
      <section class="image-preview-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
        <button type="button" class="icon-button preview-close" id="closePreviewButton" aria-label="关闭参考图">×</button>
        <div class="image-preview-media">
          <img id="previewImage" alt="">
        </div>
        <div class="image-preview-content">
          <div class="meta-row" id="previewMeta"></div>
          <h2 id="previewTitle"></h2>
          <p id="previewPrompt"></p>
          <div class="editor-actions preview-actions">
            <button type="button" class="secondary-button" id="previewCopyButton">复制提示词</button>
            <a class="secondary-button" id="previewSourceLink" target="_blank" rel="noreferrer">查看来源</a>
          </div>
        </div>
      </section>
    </div>

  </main>

  <script src="seed-prompts.js"></script>
  <script src="seed-image-prompts.js"></script>
  <script src="seed-qiaomu-prompts.js"></script>
  <script src="seed-ai-boost-prompts.js"></script>
  <script src="storage.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
