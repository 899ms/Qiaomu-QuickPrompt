<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乔木快捷提示词测试页</title>
  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    textarea,
    input,
    [contenteditable] {
      width: 100%;
      margin: 8px 0 20px;
      padding: 12px;
      border: 1px solid #bbb;
      border-radius: 8px;
      font: inherit;
    }

    textarea {
      min-height: 120px;
    }

    [contenteditable] {
      min-height: 90px;
    }
  </style>
</head>
<body>
  <h1>乔木快捷提示词测试页</h1>
  <p>先在插件侧边栏新增一条内容，把简写设为 <code>qiaomu</code>，刷新本页，然后输入 <code>qiaomu@</code>。</p>

  <label>
    Input
    <input type="text" placeholder="qiaomu@">
  </label>

  <label>
    Textarea
    <textarea placeholder="qiaomu@"></textarea>
  </label>

  <div>
    Contenteditable
    <div contenteditable="true">qiaomu@</div>
  </div>
</body>
</html>
